<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能客服 - 黑马点评</title>
    <link rel="stylesheet" href="/css/cs.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="btn-new-chat" id="btnNewChat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    新对话
                </button>
            </div>
            <div class="conversation-list" id="convList"></div>
            <div class="sidebar-empty" id="sidebarEmpty">
                <p>暂无对话记录</p>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Toggle sidebar -->
            <button class="btn-toggle-sidebar" id="btnToggleSidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>

            <!-- Header -->
            <header class="chat-header">
                <div class="header-logo">
                    <span class="logo-icon">H</span>
                    <div>
                        <h2>黑马点评智能客服</h2>
                        <p class="header-subtitle">AI 驱动的智能助手 · 随时为您服务</p>
                    </div>
                </div>
            </header>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages" style="display:none;">
                <div class="messages-wrapper" id="messagesWrapper"></div>
            </div>

            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">
                    <span>🤖</span>
                </div>
                <h1>您好，我是小点</h1>
                <p class="welcome-desc">黑马点评智能客服助手，可以帮您查询商户、优惠券、订单等信息</p>
                <div class="suggestions" id="suggestions">
                    <button class="chip">帮我查一下火锅店</button>
                    <button class="chip">附近有什么好吃的</button>
                    <button class="chip">有什么优惠券活动</button>
                    <button class="chip">最近的热门探店笔记</button>
                    <button class="chip">我的订单在哪里看</button>
                    <button class="chip">你能帮我做什么</button>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <input type="text" class="chat-input" id="chatInput"
                           placeholder="输入您的问题..." autofocus>
                    <button class="btn-send" id="btnSend" disabled>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                    </button>
                </div>
                <p class="input-hint">按 Enter 发送消息 · AI 回答仅供参考，关键信息请以实际页面为准</p>
            </div>
        </main>
    </div>

    <script src="/js/cs.js"></script>
</body>
</html>
