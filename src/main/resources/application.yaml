server:
  port: ${SERVER_PORT:8081}

spring:
  profiles:
    active: ${HMDP_PROFILE:dev}
  main:
    allow-bean-definition-overriding: true
  application:
    name: hmdp
  jackson:
    default-property-inclusion: non_null
  ai:
    model:
      chat: ${HMDP_AI_MODEL_CHAT:none}
      audio:
        speech: none
        transcription: none
      embedding: none
      image: none
      moderation: none
    openai:
      api-key: ${HMDP_AI_API_KEY:}
      base-url: ${HMDP_AI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${HMDP_AI_MODEL:deepseek-chat}
          max-tokens: ${HMDP_AI_MAX_TOKENS:1024}

mybatis-plus:
  type-aliases-package: com.hmdp.entity

hmdp:
  upload:
    image-dir: ${HMDP_IMAGE_UPLOAD_DIR:./data/hmdp/imgs}
  ai:
    enabled: ${HMDP_AI_ENABLED:false}
    api-key: ${HMDP_AI_API_KEY:}
    base-url: ${HMDP_AI_BASE_URL:https://api.deepseek.com}
    model: ${HMDP_AI_MODEL:deepseek-chat}
    max-tokens: ${HMDP_AI_MAX_TOKENS:1024}
    context-max-messages: ${HMDP_AI_CONTEXT_MAX_MESSAGES:20}
    conversation-ttl: ${HMDP_AI_CONVERSATION_TTL:1800}
    api-version: ${HMDP_AI_API_VERSION:2023-06-01}

logging:
  level:
    com.hmdp: ${HMDP_LOG_LEVEL:info}
  charset:
    console: UTF-8
