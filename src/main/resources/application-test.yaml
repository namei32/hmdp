spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${HMDP_TEST_DB_URL:jdbc:mysql://127.0.0.1:3306/hmdp_test?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf8&allowPublicKeyRetrieval=true}
    username: ${HMDP_TEST_DB_USERNAME:root}
    password: ${HMDP_TEST_DB_PASSWORD:}
  data:
    redis:
      host: ${HMDP_TEST_REDIS_HOST:127.0.0.1}
      port: ${HMDP_TEST_REDIS_PORT:6379}
      password: ${HMDP_TEST_REDIS_PASSWORD:}
      database: ${HMDP_TEST_REDIS_DATABASE:1}
      lettuce:
        pool:
          max-active: 4
          max-idle: 4
          min-idle: 1
          time-between-eviction-runs: 10s
  kafka:
    bootstrap-servers: ${HMDP_TEST_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}
    admin:
      fail-fast: false
    producer:
      acks: all
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.hmdp.event,com.hmdp.entity
    listener:
      missing-topics-fatal: false

hmdp:
  upload:
    image-dir: ${HMDP_TEST_IMAGE_UPLOAD_DIR:./target/hmdp/imgs}

logging:
  level:
    com.hmdp: ${HMDP_TEST_LOG_LEVEL:info}
